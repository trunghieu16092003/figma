<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu</title>
</head>
<body>
    <style>

        header{
            display: flex;
            justify-content: space-between;
        }
        
        .list-menu .nav{
            display: inline-block;
            margin: 20px ;
            cursor: pointer;
        }

        .list-menu li a{
            text-decoration: none;
        }

        .list-menu li:hover a{
            background-color: rgb(204, 35, 35);
            color: blanchedalmond;
        }

        .list-menu .nav:first-child{
            position: relative;
        }

        .list-menu .nav:first-child .nav-item {
            position: absolute;
            padding: 0;
            list-style: none;
            width: 100px;
            display: none;
        }


        .list-menu .nav:first-child:hover .nav-item{
            display: block;
        }

        .nav-item{
            display: block;
        }

    </style>
    <header>
        <div><img width="100" height="100" src="./images/logo.png" alt="" srcset=""></div>
        <ul class="list-menu">
            <li class="nav">
                <a href="">Trang chủ</a>
                <ul class="nav-item">
                    <li>Sản phẩm 1</li>
                    <li>Sản phẩm 2</li>
                    <li>Sản phẩm 3</li>
                </ul>
            </li>
            <li class="nav">Danh sách sản phẩm</li>
            <li class="nav">Giới thiệu</li>
            <li class="nav">Liên hệ</li>
        </ul>

        <div>
            <ul>
                <li>
                    giỏ hàng
                </li>
                <li>
                    Người dùng
                </li>
            </ul>
        </div>
    </header>

    <script>
        const header = document.getElementsByTagName('header')
    </script>
</body>
</html>
